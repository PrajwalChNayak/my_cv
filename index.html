<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prajwal Chandra Nayak – Full Stack JavaScript Developer</title>
    <meta
      name="description"
      content="Resume of Prajwal Chandra Nayak, Full Stack JavaScript Developer with 5 years of experience."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .print-only {
        display: none;
      }

      @media print {
        .print-only {
          display: inline !important;
        }

        .no-print {
          display: none !important;
        }
        body {
          background: white !important;
        }
        .page-wrapper {
          box-shadow: none !important;
          margin: 0 !important;
          border-radius: 0 !important;
        }
      }
    </style>
  </head>
  <body class="bg-gray-100 font-sans text-gray-700 antialiased">
    <div
      class="page-wrapper max-w-3xl mx-auto my-10 bg-white rounded-lg shadow-md overflow-hidden"
    >
      <!-- Download Button Bar -->
      <div
        class="no-print flex justify-end px-10 py-4 border-b border-gray-200 bg-white"
      >
        <button
          onclick="window.print()"
          class="inline-flex items-center gap-2 px-6 py-2.5 bg-blue-900 text-white text-sm font-semibold rounded-md hover:bg-blue-950 transition-colors cursor-pointer"
        >
          <svg
            class="w-4 h-4 fill-current"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M5 20h14v-2H5v2zm7-18v12.17l3.59-3.58L17 12l-5 5-5-5 1.41-1.41L12 14.17V2z"
            />
          </svg>
          Download / Print CV
        </button>
      </div>

      <div
        class="no-print px-10 py-4 bg-blue-50 text-blue-900 text-sm border-b border-gray-200"
      >
        Note: The phone number is hidden in the browser preview and will appear
        when you download or print the CV.
      </div>

      <!-- Resume Content -->
      <main id="resume-root" class="px-10 py-8"></main>
    </div>

    <script src="resume.js"></script>
  </body>
</html>
